name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: CI

    # Environment variables available to all steps and webServer
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET: ${{ secrets.SECRET }}
      NEXT_PUBLIC_STRIPE_API: ${{ secrets.NEXT_PUBLIC_STRIPE_API }}
      NEXT_PUBLIC_STRIPE_SECRET: ${{ secrets.NEXT_PUBLIC_STRIPE_SECRET }}
      API_URI: "http://localhost:3000"

    steps:
      - name: Debug Environment Variables
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "ERROR: MONGO_URI is not set!"
            exit 1
          fi
          echo "MONGO_URI is set (length: ${#MONGO_URI})"
        continue-on-error: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers with dependencies
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts

    timeout-minutes: 20